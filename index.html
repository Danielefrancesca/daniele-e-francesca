<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daniele & Francesca · 10 Aprile 2027</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --sky: #b8d8e8;
    --sky-light: #dceef7;
    --sky-pale: #eef6fb;
    --rose: #e8b4c0;
    --rose-light: #f5d4db;
    --rose-pale: #fdf0f2;
    --cream: #fafaf8;
    --ivory: #f5f2ee;
    --gold: #b8956a;
    --dark: #1e2a35;
    --mid: #4a6070;
    --soft: #7a9aaa;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  #flowers {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1.5rem;
    padding: 0.9rem 2rem;
    background: rgba(250,250,248,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(184,213,232,0.35);
    flex-wrap: wrap;
  }

  nav a {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mid);
    text-decoration: none;
    transition: color 0.3s;
  }

  nav a:hover {
    color: var(--rose);
  }

  .nav-logo {
    font-family: 'Great Vibes', cursive;
    font-size: 1.8rem;
    color: var(--sky);
    line-height: 1;
  }

  /* Sezione Password */
  #pwd-screen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #1e2a35, #0d1f2d);
    padding: 2rem;
  }

  #pwd-screen h1 {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(3rem, 10vw, 5.5rem);
    color: #b8d8e8;
    line-height: 1;
    margin-bottom: 0.3rem;
    animation: fadeUp 1s 0.2s both;
  }

  #pwd-screen .subtitle {
    font-family: 'Cormorant Garamond', serif;
    color: rgba(184,213,232,0.4);
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    animation: fadeUp 1s 0.4s both;
  }

  #pwd-screen p {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(184,213,232,0.5);
    margin-bottom: 2rem;
    text-align: center;
    animation: fadeUp 1s 0.7s both;
  }

  #pwd-screen input {
    width: 100%;
    max-width: 340px;
    padding: 1rem 1.5rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(184,213,232,0.3);
    border-radius: 2px;
    outline: none;
    text-align: center;
    letter-spacing: 0.3em;
    margin-bottom: 1rem;
    transition: border-color 0.3s, background 0.3s;
  }

  #pwd-screen input:focus {
    border-color: rgba(184,213,232,0.7);
    background: #fff;
  }

  #pwd-screen button {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, rgba(184,213,232,0.2), rgba(232,180,192,0.2));
    border: 1px solid rgba(184,213,232,0.35);
    color: white;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.3s;
  }

  #pwd-screen button:hover {
    background: linear-gradient(135deg, rgba(184,213,232,0.4), rgba(232,180,192,0.4));
  }

  #pwd-err {
    margin-top: 1rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: rgba(232,180,192,0.8);
    font-size: 1rem;
    display: none;
  }

  /* Sezione QR code e Password */
  #qr-code-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    max-width: 800px;
    margin: 0 auto;
  }

  /* Contenitore per QR code e password */
  .qr-password-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    gap: 2rem;
    position: relative;
  }

  /* QR Code */
  .qrcode {
    width: 100%;
    max-width: 300px;
  }

  /* Sezione password dots */
  .dots-container {
    width: 100%;
    max-width: 340px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    position: relative;
  }

  /* Dots */
  .dot {
    width: 20px;
    height: 20px;
    background-color: #ccc;
    border-radius: 50%;
  }

  /* Risoluzione e responsività */
  @media(max-width: 768px) {
    .qr-password-container {
      flex-direction: column;
    }

    /* Puoi aggiungere altri stili responsivi se necessario */
  }

  /* Animazioni fadeUp */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Sezione Password -->
<div id="pwd-screen">
  <h1>Daniele</h1>
  <div class="subtitle">&amp; Francesca</div>
  <p>Sito riservato agli invitati</p>
  <div style="width:100%;max-width:340px">
    <input id="pwd-inp" type="password" placeholder="Inserisci la password" onkeydown="if(event.key==='Enter')checkPwd()"
      style="width:100%;padding:1rem 1.5rem;font-family:'Cormorant Garamond',serif;font-size:1.15rem;background:rgba(255,255,255,0.07);border:1px solid rgba(184,213,232,0.3);color:white;border-radius:2px;outline:none;text-align:center;letter-spacing:0.3em;margin-bottom:1rem;"
      onfocus="this.style.borderColor='rgba(184,213,232,0.7)'" onblur="this.style.borderColor='rgba(184,213,232,0.3)'">
    <button onclick="checkPwd()">Entra ✈</button>
    <div id="pwd-err">Password errata. Riprova! 🌸</div>
  </div>
  <div style="position:absolute;bottom:2rem;font-family:'Montserrat',sans-serif;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.15)">10 Aprile 2027 · Melissano</div>
</div>

<!-- Sezione QR code e password (nascosta inizialmente) -->
<div id="qr-code-section" style="display:none;">
  <div class="qr-password-container">
    <!-- Sezione QR code -->
    <div class="qrcode">
      <!-- Inserisci qui il codice QR o immagine -->
      <img src="tuo_qrcode.png" alt="QR Code" style="width:100%; max-width:300px; border-radius:8px;">
    </div>
    <!-- Sezione password dots -->
    <div class="dots-container" id="dots-container">
      <!-- I dots saranno generati dinamicamente con JS -->
    </div>
  </div>
</div>

<!-- Script JS per gestione password e responsività -->
<script>
  const passwordLength = 6; // lunghezza password
  const dotsContainer = document.getElementById('dots-container');

  // Genera i dots dinamicamente
  function generateDots() {
    dotsContainer.innerHTML = '';
    for (let i = 0; i < passwordLength; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dotsContainer.appendChild(dot);
    }
  }

  // Chiama questa funzione all'inizio
  generateDots();

  // Gestisci la verifica password
  function checkPwd() {
    const input = document.getElementById('pwd-inp');
    const errMsg = document.getElementById('pwd-err');
    if (input.value === 'password_corretta') { // sostituisci con la tua condizione
      document.getElementById('pwd-screen').style.display = 'none';
      document.getElementById('qr-code-section').style.display = 'block';
    } else {
      errMsg.style.display = 'block';
    }
  }

  // Gestisci l'input password
  document.getElementById('pwd-inp').addEventListener('input', () => {
    const input = document.getElementById('pwd-inp').value;
    for (let i = 0; i < passwordLength; i++) {
      const dot = dotsContainer.children[i];
      if (i < input.length) {
        dot.style.backgroundColor = '#000'; // o il colore che preferisci
      } else {
        dot.style.backgroundColor = '#ccc';
      }
    }
  });
</script>

</body>
</html>
